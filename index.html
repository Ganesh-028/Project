  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  <div id="cookieConsent" style="position:fixed; bottom:0; width:100%; background:#222; color:white; padding:15px; text-align:center;">
This website uses cookies and ads (Google AdSense) to improve your experience.
<button onclick="acceptCookies()" style="margin-left:10px; padding:6px 12px;">Accept</button>
</div>

<script>
function acceptCookies() {
    document.getElementById("cookieConsent").style.display = "none";
    localStorage.setItem("cookieAccepted", "yes");
}

window.addEventListener("load", function () {
    if (localStorage.getItem("cookieAccepted") === "yes") {
        var bar = document.getElementById("cookieConsent");
        if (bar) {
            bar.style.display = "none";
        }
    }
});
</script>
  </body>
</html>
